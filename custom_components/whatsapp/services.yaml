# Service definitions for the WhatsApp Integration

send_message:
  name: Send message
  description: Send a WhatsApp message to a specific number, group name, or group ID.
  fields:
    number:
      name: Number
      description: The phone number to send the message to (with country code, e.g., 551199999999). Required if group/group_id is not specified.
      required: false
      selector:
        text:
    group:
      name: Group Name
      description: The exact name of the group to send the message to. Required if number/group_id is not specified.
      required: false
      selector:
        text:
    group_id:
      name: Group ID
      description: The ID of the group to send the message to (e.g., 120363012345678901). More stable than group name. Use the get_groups service to retrieve group IDs.
      required: false
      selector:
        text:
    message:
      name: Message
      description: The content of the message.
      required: true
      selector:
        text:
    media_url:
      name: Media URL
      description: URL of the media file to send (optional).
      required: false
      selector:
        text:
    media_path:
      name: Media Path
      description: Local path to the media file to send (optional).
      required: false
      selector:
        text:


send_broadcast:
  name: Send Broadcast
  description: Send a message to multiple targets (numbers or groups).
  fields:
    message:
      name: Message
      description: The content of the message.
      required: true
      selector:
        text:
    media_url:
      name: Media URL
      description: URL of the media file to send (optional).
      required: false
      selector:
        text:
    media_path:
      name: Media Path
      description: Local path to the media file to send (optional).
      required: false
      selector:
        text:
    targets:
      name: Targets
      description: A list of phone numbers or group names.
      required: true
      selector:
        object:


send_poll:
  name: Send Poll
  description: Send a poll to a specific number, group name, or group ID.
  fields:
    number:
      name: Number
      description: The phone number to send the poll to.
      required: false
      selector:
        text:
    group:
      name: Group Name
      description: The exact name of the group to send the poll to.
      required: false
      selector:
        text:
    group_id:
      name: Group ID
      description: The ID of the group to send the poll to (e.g., 120363012345678901). More stable than group name. Use the get_groups service to retrieve group IDs.
      required: false
      selector:
        text:
    message:
      name: Poll Question
      description: The question for the poll.
      required: true
      selector:
        text:
    options:
      name: Options
      description: List of options for the poll.
      required: true
      selector:
        object:
    allow_multiple_answers:
      name: Allow Multiple Answers
      description: Whether to allow multiple answers.
      required: false
      default: false
      selector:
        boolean:


get_groups:
  name: Get Groups
  description: Retrieve all WhatsApp groups with their IDs and names. Results are fired as a whatsapp_groups_received event.
