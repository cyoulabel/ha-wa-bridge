name: "WhatsApp Bridge"
version: "1.6.0"
slug: "ha_wa_bridge"
description: "WhatsApp Web Bridge for Home Assistant"
url: "https://github.com/raulpetruta/ha-wa-bridge"
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
map:
  - config: rw
options:
  detect_own_messages: false
  incoming_messages_mode: "all"
  allowed_groups: []
  allowed_numbers: []
schema:
  detect_own_messages: bool
  incoming_messages_mode: "match(all|disabled|groups_only|numbers_only)"
  allowed_groups: [str]
  allowed_numbers: [str]
ports:
  3000/tcp: 3000
