services:
  wa-bridge:
    # Build locally for testing, or pull from GHCR
    build: ./wa-bridge
    image: ghcr.io/raulpetruta/ha-whatsapp-bridge:latest
    container_name: ha-whatsapp-bridge
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./wa-bridge/.wwebjs_auth:/usr/src/app/.wwebjs_auth
      - ./wa-bridge/.wwebjs_cache:/usr/src/app/.wwebjs_cache
    environment:
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - DETECT_OWN_MESSAGES=true # Set to true to allow the bridge to detect and broadcast messages sent by your own authenticated WhatsApp account
      - INCOMING_MESSAGES_MODE=all # Set to 'all' to allow all messages, or 'numbers_only' to allow only messages from specific numbers, or 'groups_only' to allow only messages from specific groups
      - INCOMING_MESSAGE_LOG_LEVEL=FULL # FULL = log entire payload (default), COMPACT = sender & type only, NONE = no incoming message logs
      # - ALLOWED_NUMBERS=40741234567 # Set to allow only messages from specific numbers
      # - ALLOWED_GROUPS=Family Group,Work Team # Set to allow only messages from specific groups
